<title>Vorratskammer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,500;0,9..144,600;1,9..144,500&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#F8E9D2;
    --card:#FFF9F0;
    --ink:#4A3324;
    --ink-soft:#8C7362;
    --line:#EAD5B0;

    --recipes:#D8622F;
    --recipes-soft:#F6D9BC;
    --week:#5F8A3E;
    --week-soft:#DCEAC9;
    --shop:#C1477A;
    --shop-soft:#F5D6E4;
    --clean:#DDA324;
    --clean-soft:#F7E7B8;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--paper);
    color:var(--ink);
    font-family:'Inter',sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  #app{max-width:640px;margin:0 auto;padding:20px 16px 60px;}
  header{padding:8px 4px 20px;}
  header h1{
    font-family:'Fraunces',serif;
    font-weight:600;
    font-size:1.95rem;
    margin:0 0 4px;
    letter-spacing:-0.01em;
    color:var(--recipes);
  }
  header p{margin:0;color:var(--ink-soft);font-size:0.92rem;font-style:italic;}
  header .divider{
    margin:10px 0 2px;
    letter-spacing:0.4em;
    font-size:0.7rem;
    color:var(--week);
  }

  .tabs{display:flex;gap:6px;margin-bottom:0;position:relative;z-index:1;}
  .tab{
    flex:1;
    text-align:center;
    padding:11px 4px 13px;
    font-family:'Fraunces',serif;
    font-weight:600;
    font-size:0.86rem;
    border:none;
    cursor:pointer;
    border-radius:10px 10px 0 0;
    background:var(--line);
    color:var(--ink-soft);
    transform:translateY(6px);
    transition:transform .15s ease, background .15s ease, color .15s ease;
  }
  .tab.active{transform:translateY(0);color:#fff;box-shadow:0 -2px 8px rgba(0,0,0,.08);}
  .tab[data-tab="recipes"].active{background:var(--recipes);}
  .tab[data-tab="week"].active{background:var(--week);}
  .tab[data-tab="shop"].active{background:var(--shop);}
  .tab[data-tab="clean"].active{background:var(--clean);}

  .card{
    background:var(--card);
    border-radius:4px 18px 18px 18px;
    border:1px solid var(--line);
    padding:18px;
    min-height:300px;
    box-shadow:0 6px 20px rgba(74,51,36,.10);
  }
  .section-title{
    font-family:'Fraunces',serif;
    font-weight:600;
    font-size:1.15rem;
    margin:0 0 12px;
  }
  .muted{color:var(--ink-soft);font-size:0.88rem;}

  button.action{
    font-family:'Inter',sans-serif;
    font-weight:600;
    font-size:0.85rem;
    border:none;
    border-radius:20px;
    padding:8px 16px;
    cursor:pointer;
    background:var(--ink);
    color:#fff;
  }
  button.ghost{
    background:transparent;
    color:var(--ink-soft);
    border:1px solid var(--line);
  }
  button.small{padding:5px 10px;font-size:0.78rem;}
  input,textarea,select{
    font-family:'Inter',sans-serif;
    font-size:0.9rem;
    padding:8px 10px;
    border:1px solid var(--line);
    border-radius:10px;
    background:#FFFDF8;
    width:100%;
  }
  textarea{resize:vertical;min-height:70px;}
  label{font-size:0.78rem;color:var(--ink-soft);font-weight:600;display:block;margin-bottom:4px;}
  .field{margin-bottom:10px;}
  .row{display:flex;gap:8px;}
  .row > *{flex:1;}

  .recipe-item{
    border-bottom:1px solid var(--line);
    padding:12px 0;
  }
  .recipe-item:last-child{border-bottom:none;}
  .recipe-head{display:flex;justify-content:space-between;align-items:baseline;cursor:pointer;gap:8px;}
  .recipe-head h3{font-family:'Fraunces',serif;font-weight:600;font-size:1.02rem;margin:0;}
  .tag{
    display:inline-block;
    font-size:0.72rem;
    font-weight:600;
    color:var(--recipes);
    background:var(--recipes-soft);
    padding:2px 8px;
    border-radius:20px;
    margin-top:3px;
  }
  .recipe-body{margin-top:10px;font-size:0.88rem;line-height:1.5;display:none;}
  .recipe-body.open{display:block;}
  .recipe-body pre{white-space:pre-wrap;font-family:inherit;margin:4px 0 10px;}
  .recipe-body h4{font-size:0.8rem;margin:0 0 2px;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.04em;}

  .day-block{border-bottom:1px solid var(--line);padding:10px 0;}
  .day-block:last-child{border-bottom:none;}
  .day-block h4{font-family:'Fraunces',serif;font-size:0.95rem;margin:0 0 6px;color:var(--week);}

  .shop-item{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--line);}
  .shop-item:last-child{border-bottom:none;}
  .shop-item.checked span{text-decoration:line-through;color:var(--ink-soft);}
  .shop-item input[type=checkbox]{width:18px;height:18px;flex:none;accent-color:var(--shop);}
  .shop-item span{flex:1;font-size:0.92rem;}

  .clean-item{padding:10px 0;border-bottom:1px solid var(--line);}
  .clean-item:last-child{border-bottom:none;}
  .clean-item.overdue{
    background:#FBEAE4;
    border-left:4px solid #B0503A;
    border-radius:10px;
    padding:10px 12px;
    margin-bottom:6px;
  }
  .clean-item.overdue .clean-top strong{color:#9C3E2C;}
  .clean-item.overdue .clean-meta{color:#A56152;}
  .clean-top{display:flex;justify-content:space-between;align-items:center;gap:8px;}
  .clean-top strong{font-size:0.94rem;}
  .clean-meta{font-size:0.78rem;color:var(--ink-soft);margin-top:2px;}
  .assignee-pill{
    font-size:0.76rem;font-weight:600;color:var(--clean);
    background:var(--clean-soft);padding:2px 9px;border-radius:20px;white-space:nowrap;
  }
  .freshness{display:inline-flex;align-items:center;gap:5px;font-size:0.74rem;font-weight:600;padding:2px 9px;border-radius:20px;margin-top:5px;}
  .freshness .dot{width:7px;height:7px;border-radius:50%;flex:none;}
  .freshness.ok{background:var(--week-soft);color:#4F5C36;}
  .freshness.ok .dot{background:var(--week);}
  .freshness.warning{background:var(--clean-soft);color:#8A611F;}
  .freshness.warning .dot{background:var(--clean);}
  .freshness.overdue{background:#F3DAD0;color:#9C4A2E;}
  .freshness.overdue .dot{background:#B0503A;}
  .freshness.neutral{background:var(--line);color:var(--ink-soft);}
  .freshness.neutral .dot{background:var(--ink-soft);}

  .toolbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;gap:8px;flex-wrap:wrap;}
  .modal-bg{
    position:fixed;inset:0;background:rgba(32,41,31,.45);
    display:flex;align-items:flex-end;justify-content:center;z-index:10;
  }
  .modal{
    background:var(--card);width:100%;max-width:640px;
    border-radius:22px 22px 0 0;padding:20px 18px 26px;
    max-height:88vh;overflow-y:auto;
  }
  .modal h3{font-family:'Fraunces',serif;margin:0 0 14px;color:var(--recipes);}
  .modal-actions{display:flex;gap:8px;margin-top:14px;justify-content:flex-end;}
  .empty{text-align:center;padding:36px 10px;color:var(--ink-soft);font-size:0.9rem;}
  .loading{text-align:center;padding:36px 10px;color:var(--ink-soft);font-size:0.85rem;}
  .member-chip{
    display:inline-flex;align-items:center;gap:6px;background:var(--clean-soft);
    color:var(--clean);border-radius:20px;padding:4px 6px 4px 12px;font-size:0.82rem;font-weight:600;margin:0 6px 6px 0;
  }
  .member-chip button{border:none;background:none;color:var(--clean);cursor:pointer;font-size:0.95rem;line-height:1;padding:2px;}
  .mood-box{
    background:var(--clean-soft);
    border-radius:14px;
    padding:14px 16px;
    margin-bottom:16px;
  }
  .mood-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
  .mood-top .face{font-size:1.6rem;}
  .mood-label{font-family:'Fraunces',serif;font-weight:600;font-size:0.95rem;color:var(--ink);}
  .mood-track{background:rgba(255,255,255,.6);border-radius:20px;height:10px;overflow:hidden;}
  .mood-fill{height:100%;border-radius:20px;transition:width .5s ease;}
  .mood-top .face{transition:transform .2s ease;cursor:pointer;background:none;border:none;padding:0;}
  .mood-top .face:active{transform:scale(1.3);}
  .need-row{display:flex;align-items:center;gap:8px;padding:6px 0;cursor:pointer;border:none;background:none;width:100%;text-align:left;}
  .need-row .need-icon{font-size:1.1rem;flex:none;width:22px;text-align:center;}
  .need-row .need-label{font-size:0.8rem;color:var(--ink);flex:none;width:64px;}
  .need-row .need-track{flex:1;background:rgba(0,0,0,.06);border-radius:20px;height:7px;overflow:hidden;}
  .need-row .need-fill{height:100%;border-radius:20px;transition:width .5s ease;}
  .board-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--line);}
  .board-row:last-child{border-bottom:none;}
  .board-medal{width:22px;text-align:center;font-size:1rem;flex:none;}
  .board-name{flex:1;font-weight:600;font-size:0.9rem;}
  .board-title{font-size:0.74rem;color:var(--ink-soft);}
  .board-points{font-size:0.82rem;font-weight:700;color:var(--clean);flex:none;}
  .board-bar{background:var(--line);border-radius:20px;height:5px;overflow:hidden;margin-top:3px;width:100%;}
  .board-bar-fill{height:100%;background:var(--clean);border-radius:20px;}
  #toast{
    position:fixed;top:14px;left:50%;transform:translateX(-50%) translateY(-8px);
    background:var(--ink);color:#fff;padding:8px 16px;border-radius:20px;
    font-size:0.82rem;font-weight:600;opacity:0;pointer-events:none;
    transition:opacity .25s ease, transform .25s ease;z-index:50;white-space:nowrap;
  }
  #toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
  #toast.error{background:#9C3E2C;}
  @keyframes confettiFall{
    0%{ transform:translateY(0) rotate(0deg); opacity:1; }
    100%{ transform:translateY(100vh) rotate(540deg); opacity:0; }
  }
  .streak-box{
    display:flex;align-items:center;gap:8px;
    background:var(--clean-soft);border-radius:14px;padding:10px 14px;margin-bottom:14px;
    font-family:'Fraunces',serif;font-weight:600;color:var(--ink);
  }
  .badge-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px;}
  .badge-chip{
    font-size:0.76rem;font-weight:600;padding:4px 10px;border-radius:20px;
  }
  .badge-chip.earned{background:var(--clean);color:#fff;}
  .badge-chip.locked{background:var(--line);color:var(--ink-soft);}
  .quest-card{
    background:linear-gradient(135deg, var(--recipes) 0%, #C1477A 100%);
    color:#fff;border-radius:16px;padding:14px 16px;margin-bottom:14px;
  }
  .quest-card .quest-label{font-size:0.74rem;letter-spacing:.08em;text-transform:uppercase;opacity:.85;}
  .quest-card h4{font-family:'Fraunces',serif;font-size:1.1rem;margin:4px 0 6px;}
  .quest-card .quest-reward{font-size:0.8rem;opacity:.95;}
  .quest-card.done{background:var(--week);}
  details.section{
    background:var(--card);border:1px solid var(--line);border-radius:14px;
    padding:10px 14px;margin-bottom:12px;
  }
  details.section > summary{
    cursor:pointer;font-family:'Fraunces',serif;font-weight:600;
    font-size:0.95rem;list-style:none;display:flex;justify-content:space-between;align-items:center;
  }
  details.section > summary::-webkit-details-marker{display:none;}
  details.section > summary::after{content:'▾';opacity:.5;font-size:0.8rem;}
  details.section[open] > summary::after{content:'▴';}
  details.section > div{margin-top:12px;}
  .subtask-row{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;}
  .subtask-chip{
    display:inline-flex;align-items:center;gap:5px;
    font-size:0.78rem;padding:5px 11px;border-radius:20px;cursor:pointer;
    border:1px solid var(--line);background:var(--card);color:var(--ink);
  }
  .subtask-chip.done{background:var(--week-soft);border-color:var(--week);color:var(--week);text-decoration:line-through;}
  #printArea{display:none;}
  @media print{
    @page{ margin: 16mm 14mm; }
    body{ background:#fff; }
    #app, #toast{ display:none !important; }
    #printArea{
      display:block;
      font-family:'Inter',sans-serif;
      color:#20291F;
      max-width:100%;
    }
    .print-recipe{ page-break-inside:avoid; }
    .print-recipe h2{
      font-family:'Fraunces',serif;
      font-weight:600;
      font-size:1.6rem;
      margin:0 0 4px;
      color:#20291F;
      border-bottom:2px solid #D8622F;
      padding-bottom:8px;
    }
    .print-recipe .meta{
      font-size:0.8rem;
      color:#6b6b6b;
      text-transform:uppercase;
      letter-spacing:.05em;
      margin:8px 0 2px;
    }
    .print-recipe .source{
      font-size:0.78rem;
      color:#8a8a8a;
      margin-bottom:10px;
      word-break:break-all;
    }
    .print-recipe h4{
      font-family:'Fraunces',serif;
      font-size:0.95rem;
      font-weight:600;
      margin:18px 0 6px;
      color:#5F8A3E;
    }
    .print-recipe .ing-group{
      font-weight:600;
      font-size:0.85rem;
      margin:10px 0 4px;
      color:#D8622F;
    }
    .print-recipe ul.ing-list{
      list-style:none;
      padding:0;
      margin:0 0 4px;
    }
    .print-recipe ul.ing-list li{
      font-size:0.92rem;
      padding:4px 0 4px 18px;
      position:relative;
      border-bottom:1px dotted #ddd;
    }
    .print-recipe ul.ing-list li::before{
      content:'';
      position:absolute;
      left:0; top:11px;
      width:6px; height:6px;
      border-radius:50%;
      background:#D8622F;
    }
    .print-recipe ol{
      padding-left:20px;
      margin:4px 0;
    }
    .print-recipe ol li{
      font-size:0.92rem;
      line-height:1.6;
      margin-bottom:8px;
    }
    .print-footer{
      margin-top:20px;
      font-size:0.72rem;
      color:#aaa;
      text-align:center;
    }
  }
</style>
</head>
<body>
<div id="app">
  <header>
    <h1>Vorratskammer</h1>
    <p class="muted">Rezepte, Wochenplan, Einkauf &amp; Putzplan – an einem Ort, geteilt fürs ganze Haus.</p>
    <div class="divider">✦ ✦ ✦</div>
    <button class="action ghost small" id="backupBtn" style="margin-top:10px">⇅ Datensicherung</button>
  </header>
  <div class="tabs">
    <button class="tab" data-tab="recipes">Rezepte</button>
    <button class="tab" data-tab="week">Wochenplan</button>
    <button class="tab" data-tab="shop">Einkauf</button>
    <button class="tab" data-tab="clean">Putzplan</button>
  </div>
  <div class="card" id="content"><div class="loading">Lädt …</div></div>
</div>
<div id="toast"></div>
<div id="printArea"></div>

<script>
const KEYS = { recipes:'recipes', week:'weekplan', weekNext:'weekplanNext', weekMeta:'weekplanMeta', shop:'shoppinglist', clean:'cleaning' };
const DAYS = ['Montag','Dienstag','Mittwoch','Donnerstag','Freitag','Samstag','Sonntag'];
let state = { recipes:[], week:{}, weekNext:{}, weekMeta:{weekStart:null}, shop:[], clean:{members:[], tasks:[]} };
let activeTab = 'recipes';
let openRecipeId = null;
let servingOverrides = {};
let recipeSearch = '';
let categoryFilter = '';
let weekViewMode = 'current';

function getMonday(d){
  const date = new Date(d);
  const day = date.getDay();
  const diff = day===0 ? -6 : 1-day;
  date.setDate(date.getDate()+diff);
  date.setHours(0,0,0,0);
  return date;
}
function isoDate(d){
  const y = d.getFullYear();
  const m = String(d.getMonth()+1).padStart(2,'0');
  const day = String(d.getDate()).padStart(2,'0');
  return `${y}-${m}-${day}`;
}
function addDays(d, n){ const nd = new Date(d); nd.setDate(nd.getDate()+n); return nd; }
function formatDayHeader(d){
  return d.toLocaleDateString('de-DE', {weekday:'long', day:'2-digit', month:'2-digit'});
}

function parseIngredientLine(line){
  const t = line.trim();
  if(!t) return null;
  if(/:\s*$/.test(t) && !/^[\d.,]/.test(t)) return {header:true, text:t.replace(/:\s*$/,'')};
  const m = t.match(/^([\d]+(?:[.,]\d+)?)\s*(.*)$/);
  if(m) return {header:false, amount:parseFloat(m[1].replace(',','.')), rest:m[2]};
  return {header:false, amount:null, rest:t};
}
function formatDe(n){
  const r = Math.round(n*100)/100;
  return (r % 1 === 0) ? r.toString() : r.toFixed(2).replace(/0$/,'').replace(/0$/,'').replace('.',',').replace(/,$/,'');
}
function formatScaled(n){
  let r;
  if(n >= 10) r = Math.round(n);
  else if(n >= 2) r = Math.round(n*2)/2;
  else r = Math.round(n*4)/4;
  return (r % 1 === 0) ? r.toString() : r.toString().replace('.',',');
}
const RECIPE_CATEGORY_ICONS = [
  ['Auflauf','🥘'],['Suppe','🍲'],['Eintopf','🍲'],['Bowl','🥗'],['Salat','🥗'],

];
function getCategoryIcon(category){
  const c = (category||'').toLowerCase();
  const hit = RECIPE_CATEGORY_ICONS.find(([k])=> c.includes(k.toLowerCase()));
  return hit ? hit[1] : '🍽️';
}
function guessCategory(title, ingredients){
  const text = ((title||'')+' '+(ingredients||'')).toLowerCase();
  const rules = [
    [/auflauf/,'Auflauf'], [/suppe|eintopf/,'Suppe'], [/\bbowl\b/,'Bowl'],
    [/curry/,'Curry'], [/lasagne/,'Auflauf'], [/pizza/,'Pizza'],
    [/pasta|spaghetti|nudel|spätzle/,'Pasta'], [/salat/,'Salat'],
    [/kuchen|dessert|nachtisch/,'Dessert'], [/frühstück|porridge|müsli/,'Frühstück']
  ];
  for(const [re,cat] of rules){ if(re.test(text)) return cat; }
  return 'Hauptgericht';
}

const UNITS = ['g','kg','ml','l','tl','el','stk','stück','prise','prisen','bund','zehe','zehen','scheibe','scheiben','dose','dosen','pkg','packung','packungen'];
function parseAmountUnitName(line){
  const t = (line||'').trim();
  const m = t.match(/^([\d]+(?:[.,]\d+)?)\s*([a-zA-ZäöüÄÖÜß]*)\s*(.*)$/);
  if(!m) return {amount:null, unit:'', name:t};
  const amount = parseFloat(m[1].replace(',','.'));
  const token = (m[2]||'').toLowerCase();
  if(UNITS.includes(token)) return {amount, unit:token, name:m[3].trim()};
  return {amount, unit:'', name:(m[2]+' '+m[3]).trim()};
}
function normalizeName(name){
  let n = (name||'').toLowerCase().trim().replace(/[.,;]/g,'');
  if(n.length>4 && n.endsWith('n')) n = n.slice(0,-1);
  else if(n.length>4 && n.endsWith('e')) n = n.slice(0,-1);
  return n;
}
function effectiveAmount(a){ return a==null ? 1 : a; }
function addOrMergeShopItem(line){
  const parsed = parseAmountUnitName(line);
  const normName = normalizeName(parsed.name);
  if(!normName) return;
  const existing = state.shop.find(it=>{
    if(it.checked) return false;
    const ex = parseAmountUnitName(it.text);
    return normalizeName(ex.name)===normName && ex.unit===parsed.unit;
  });
  if(existing){
    const ex = parseAmountUnitName(existing.text);
    const total = effectiveAmount(ex.amount) + effectiveAmount(parsed.amount);
    existing.text = formatDe(total) + (parsed.unit? ' '+parsed.unit:'') + ' ' + parsed.name;
    return;
  }
  state.shop.push({id:uid(), text:line, checked:false});
}
function consolidateShopList(){
  const merged = [];
  state.shop.forEach(it=>{
    if(it.checked){ merged.push(it); return; }
    const parsed = parseAmountUnitName(it.text);
    const normName = normalizeName(parsed.name);
    const match = merged.find(m=>{
      if(m.checked) return false;
      const mp = parseAmountUnitName(m.text);
      return normalizeName(mp.name)===normName && mp.unit===parsed.unit;
    });
    if(match){
      const mp = parseAmountUnitName(match.text);
      const total = effectiveAmount(mp.amount) + effectiveAmount(parsed.amount);
      match.text = formatDe(total) + (parsed.unit?' '+parsed.unit:'') + ' ' + parsed.name;
    } else merged.push(it);
  });
  state.shop = merged;
}

async function checkWeekRollover(){
  const thisMonday = isoDate(getMonday(new Date()));
  const storedStart = state.weekMeta && state.weekMeta.weekStart;
  if(storedStart === thisMonday) return; // already up to date, nothing to do
  if(storedStart && storedStart < thisMonday){
    // a week (or more) has passed since we last recorded a start date:
    // promote "next week"'s plan to "current", clear "next"
    state.week = state.weekNext || {};
    state.weekNext = {};
    await saveKey(KEYS.week, state.week);
    await saveKey(KEYS.weekNext, state.weekNext);
  }
  state.weekMeta = { weekStart: thisMonday };
  await saveKey(KEYS.weekMeta, state.weekMeta);
}

function parseImport(text){
  const blocks = text.split(/^\s*-{3,}\s*$/m).map(b=>b.trim()).filter(Boolean);
  return blocks.map(block=>{
    const get = (field, stopFields)=>{
      const re = new RegExp(field + ':\\s*([\\s\\S]*?)(?=(?:' + stopFields.join('|') + '):|$)', 'i');
      const m = block.match(re);
      return m ? m[1].trim() : '';
    };
    const fields = ['Titel','Kategorie','Link','Portionen','Schnibbelzeit','Zubereitungszeit','Kalorien','Protein','Zutaten','Zubereitung'];
    const titleVal = get('Titel', fields.filter(f=>f!=='Titel')) || 'Ohne Titel';
    const ingVal = get('Zutaten', fields.filter(f=>f!=='Zutaten'));
    const catVal = get('Kategorie', fields.filter(f=>f!=='Kategorie'));
    return {
      id: uid(),
      title: titleVal,
      category: catVal || guessCategory(titleVal, ingVal),
      link: get('Link', fields.filter(f=>f!=='Link')),
      servings: parseInt(get('Portionen', fields.filter(f=>f!=='Portionen'))) || 4,
      prepTime: get('Schnibbelzeit', fields.filter(f=>f!=='Schnibbelzeit')),
      cookTime: get('Zubereitungszeit', fields.filter(f=>f!=='Zubereitungszeit')),
      calories: parseInt(get('Kalorien', fields.filter(f=>f!=='Kalorien'))) || 0,
      protein: parseInt(get('Protein', fields.filter(f=>f!=='Protein'))) || 0,
      ingredients: ingVal,
      steps: get('Zubereitung', fields.filter(f=>f!=='Zubereitung'))
    };
  }).filter(r=>r.title!=='Ohne Titel' || r.ingredients || r.steps);
}
function parseDuration(iso){
  if(!iso) return '';
  const m = String(iso).match(/PT(?:(\d+)H)?(?:(\d+)M)?/);
  if(!m || (!m[1] && !m[2])) return '';
  const h = parseInt(m[1]||0), mnt = parseInt(m[2]||0);
  const parts = [];
  if(h) parts.push(h + (h===1?' Stunde':' Stunden'));
  if(mnt) parts.push(mnt + ' Minuten');
  return parts.join(' ');
}
function parseJsonLdRecipe(data, url){

    steps = instr.map(i=>{
      if(typeof i === 'string') return i;
      if(i.text) return i.text;
      if(i.itemListElement) return i.itemListElement.map(x=>x.text||'').join('\n');
      return '';
    }).filter(Boolean).join('\n');
  } else if(typeof instr === 'string'){
    steps = instr;
  }
  let servings = 4;
  if(data.recipeYield){
    const y = Array.isArray(data.recipeYield) ? data.recipeYield[0] : data.recipeYield;
    const m = String(y).match(/\d+/);
    if(m) servings = parseInt(m[0]);
  }
  let calories = 0, protein = 0;
  if(data.nutrition){
    const cm = String(data.nutrition.calories||'').match(/[\d.]+/);
    if(cm) calories = Math.round(parseFloat(cm[0]));
    const pm = String(data.nutrition.proteinContent||'').match(/[\d.]+/);
    if(pm) protein = Math.round(parseFloat(pm[0]));
  }
  return {
    id:null, title, category:'', servings,
    prepTime: parseDuration(data.prepTime),

const CORS_PROXIES = [
  url => 'https://api.allorigins.win/raw?url=' + encodeURIComponent(url),
  url => 'https://corsproxy.io/?url=' + encodeURIComponent(url),
  url => 'https://thingproxy.freeboard.io/fetch/' + url
];
async function fetchViaProxies(url){
  let lastError = null;
  for(const buildUrl of CORS_PROXIES){
    try{
      const res = await fetch(buildUrl(url));
      if(res.ok){
        const html = await res.text();
        if(html && html.length > 200) return html;
      }
    }catch(e){ lastError = e; }
  }
  throw lastError || new Error('Alle Auslese-Dienste nicht erreichbar');
}
async function fetchRecipeFromLink(url){
  const html = await fetchViaProxies(url);
  const doc = new DOMParser().parseFromString(html, 'text/html');
  const scripts = Array.from(doc.querySelectorAll('script[type="application/ld+json"]'));
  for(const s of scripts){
    try{
      const json = JSON.parse(s.textContent);
      const candidates = Array.isArray(json) ? json : (json['@graph'] || [json]);
      const found = candidates.find(o => {
        const t = o && o['@type'];
        return t === 'Recipe' || (Array.isArray(t) && t.includes('Recipe'));
      });
      if(found) return { data: parseJsonLdRecipe(found, url), partial:false };
    }catch(e){ /* try next script block */ }
  }
  const ogTitle = doc.querySelector('meta[property="og:title"]')?.content || '';
  const ogDesc = doc.querySelector('meta[property="og:description"]')?.content || '';
  return {
    data: { id:null, title:ogTitle, category:'', servings:4, prepTime:'', cookTime:'', calories:0, protein:0, link:url, ingredients:ogDesc, steps:'' },
    partial:true
  };
}

const TASK_RANKS = ['Neuland','Bekannt','Vertraut','Eingespielt','Routine','Perfektioniert'];
function taskMastery(task){
  const done = task.completedCount || 0;
  const thresholds = [0,3,8,15,25,40];
  let idx = 0;
  for(let i=thresholds.length-1;i>=0;i--){ if(done>=thresholds[i]){ idx=i; break; } }
  const nextAt = thresholds[idx+1] || null;
  const prevAt = thresholds[idx];
  return {
    rank: TASK_RANKS[idx], level: idx+1, done,
    nextAt,
    progress: nextAt ? ((done-prevAt)/(nextAt-prevAt))*100 : 100
  };
}

function dailyQuestTask(){
  const tasks = (state.clean.tasks||[]).filter(t=>parseFreqDays(t.freq));
  if(!tasks.length) return null;
  const ranked = sortTasksByUrgency(tasks);
  const pool = ranked.slice(0, Math.min(3, ranked.length));
  const today = isoDate(new Date());
  let seed = 0;
  for(const ch of today) seed += ch.charCodeAt(0);
  return pool[seed % pool.length];
}

async function applySubtask(t, sub, who){
  const members = state.clean.members || [];
  const msgs = [];
  const moodBeforeAction = houseMood().percent;
  const overdueDaysBefore = t.lastRotated
    ? Math.max(0, Math.floor((Date.now() - new Date(t.lastRotated).getTime()) / 86400000))
    : 0;
  if(sub.done){
    // untick
    sub.done = false;
    sub.doneBy = null;
  } else {
    sub.done = true;
    sub.doneBy = who || null;
    if(who){
      const share = Math.max(3, Math.round(taskXpValue(t) / t.subtasks.length));
      state.clean.points = state.clean.points || {};
      state.clean.points[who] = (state.clean.points[who]||0) + share;
      const cat = t.category || 'Sonstiges';
      state.clean.skills = state.clean.skills || {};
      state.clean.skills[who] = state.clean.skills[who] || {};
      state.clean.skills[who][cat] = (state.clean.skills[who][cat]||0) + 4;
      state.clean.subtaskCount = (state.clean.subtaskCount||0) + 1;
      msgs.push(`${who} +${share} Punkte für „${sub.name}"`);
    }
  }

  const allDone = t.subtasks.length > 0 && t.subtasks.every(s=>s.done);
  let lastHelpers = 0;
  if(allDone){
    const helpers = [...new Set(t.subtasks.map(s=>s.doneBy).filter(Boolean))];
    lastHelpers = helpers.length;
    t.completedCount = (t.completedCount||0) + 1;
    t.lastRotated = new Date().toISOString();
    t.doneBy = t.doneBy || {};
    helpers.forEach(h=>{ t.doneBy[h] = (t.doneBy[h]||0) + 1; });
    if(!t.firstDoneBy && helpers.length){ t.firstDoneBy = helpers.join(' & '); t.firstDoneAt = new Date().toISOString(); }
    const n = members.length;
    if(n>0) t.assigneeIdx = (t.assigneeIdx+1) % n;
    t.subtasks.forEach(s=>{ s.done=false; s.doneBy=null; });

    const today = isoDate(new Date());
    state.clean.streak = state.clean.streak || {count:0, lastDate:null};
    if(state.clean.streak.lastDate !== today){
      const yesterday = isoDate(addDays(new Date(), -1));
      state.clean.streak.count = (state.clean.streak.lastDate === yesterday) ? state.clean.streak.count + 1 : 1;
      state.clean.streak.lastDate = today;
    }
    msgs.unshift(helpers.length > 1
      ? `🎉 „${t.task}" gemeinsam erledigt (${helpers.join(' & ')})!`
      : `🎉 „${t.task}" komplett erledigt!`);
    triggerConfetti();
  }

  const helpersCount = t.subtasks ? new Set(t.subtasks.map(s=>s.doneBy).filter(Boolean)).size : 1;
  const secrets = await checkSecretBadges(buildSecretContext({
    category: t.category,
    expectedDays: parseFreqDays(t.freq) || 7,
    overdueDays: overdueDaysBefore,
    helpers: Math.max(1, lastHelpers || helpersCount),
    moodBefore: moodBeforeAction
  }));
  secrets.forEach(b=> msgs.push(`${b.icon} Geheimes Abzeichen: „${b.name}" – ${b.hint}`));
  if(secrets.length) triggerConfetti();

  await saveKey(KEYS.clean, state.clean);
  render();
  msgs.forEach((m,i)=> setTimeout(()=> showToast(m), 300 + i*1900));
}

const SEASONS = [
  {key:'fruehling', label:'Frühling', icon:'🌱', months:[2,3,4]},
  {key:'sommer',    label:'Sommer',   icon:'☀️', months:[5,6,7]},
  {key:'herbst',    label:'Herbst',   icon:'🍂', months:[8,9,10]},
  {key:'winter',    label:'Winter',   icon:'❄️', months:[11,0,1]}
];
function currentSeason(d = new Date()){
  const m = d.getMonth();
  const season = SEASONS.find(s=>s.months.includes(m));
  // Winter spans the year boundary: Dec belongs to the season year of the following Jan/Feb
  const year = (season.key==='winter' && m===11) ? d.getFullYear()+1 : d.getFullYear();
  return { ...season, year, id: season.key + '-' + year };
}
async function checkSeasonRollover(){
  const now = currentSeason();
  const stored = state.clean.season;
  if(!stored || !stored.id){
    state.clean.season = {id: now.id, startedAt: isoDate(new Date())};
    await saveKey(KEYS.clean, state.clean);
    return null;
  }
  if(stored.id === now.id) return null;

  // season changed: archive the finished one and reset points/skills
  const prevPoints = state.clean.points || {};
  const total = Object.values(prevPoints).reduce((s,p)=>s+p,0);
  state.clean.seasonHistory = state.clean.seasonHistory || [];
  state.clean.seasonHistory.push({
    id: stored.id,
    endedAt: isoDate(new Date()),
    points: {...prevPoints},
    total
  });
  if(state.clean.seasonHistory.length > 12) state.clean.seasonHistory = state.clean.seasonHistory.slice(-12);

  state.clean.points = {};
  state.clean.skills = {};
  state.clean.season = {id: now.id, startedAt: isoDate(new Date())};
  await saveKey(KEYS.clean, state.clean);
  return stored.id;
}
function seasonLabel(id){
  if(!id) return '';
  const [key, year] = id.split('-');
  const s = SEASONS.find(x=>x.key===key);
  return s ? `${s.icon} ${s.label} ${year}` : id;
}

async function checkSecretBadges(ctx){
  state.clean.secrets = state.clean.secrets || {};
  const newly = [];
  for(const b of SECRET_BADGES){
    if(state.clean.secrets[b.id]) continue;
    let hit = false;
    try{ hit = !!b.test(ctx); }catch(e){ hit = false; }
    if(hit){
      state.clean.secrets[b.id] = isoDate(new Date());
      newly.push(b);
    }
  }
  return newly;
}
function buildSecretContext(extra){
  const now = new Date();
  const points = state.clean.points || {};
  const tasks = state.clean.tasks || [];
  const categoryCount = {};
  tasks.forEach(t=>{
    if(t.category) categoryCount[t.category] = (categoryCount[t.category]||0) + (t.completedCount||0);
  });
  return {
    hour: now.getHours(),
    weekday: now.getDay(),
    dayOfMonth: now.getDate(),
    streak: (state.clean.streak||{}).count || 0,
    seasonPoints: Object.values(points).reduce((s,p)=>s+p,0),
    seasonTotal: tasks.reduce((s,t)=>s+(t.completedCount||0),0),
    criticalTotal: state.clean.criticalCount || 0,
    subtaskTotal: state.clean.subtaskCount || 0,
    todayCount: (state.clean.dayLog && state.clean.dayLog.date === isoDate(now)) ? state.clean.dayLog.count : 0,
    moodPercent: houseMood().percent,
    categoryCount,
    ...extra
  };
}
function parseFreqDays(freq){
  const exact = FREQ_OPTIONS.find(o=> o.value.toLowerCase()===((freq||'').trim().toLowerCase()));
  if(exact) return exact.days;
  const f = (freq||'').toLowerCase();
  let m;
  if(/täglich|jeden tag|1x.*tag/.test(f)) return 1;
  if(m = f.match(/alle\s+(\d+)\s*tag/)) return parseInt(m[1]);
  if(/zweiwöchentlich|vierzehntägig|alle 2 wochen/.test(f)) return 14;
  if(m = f.match(/alle\s+(\d+)\s*woche/)) return parseInt(m[1])*7;
  if(/wöchentlich|jede woche|1x.*woche|einmal.*woche/.test(f)) return 7;
  if(m = f.match(/alle\s+(\d+)\s*monat/)) return parseInt(m[1])*30;
  if(/monatlich|jeden monat|1x.*monat|einmal.*monat/.test(f)) return 30;
  return null;
}
function daysSinceCalendar(iso){
  const d = new Date(iso);
  const now = new Date();
  const start = new Date(d.getFullYear(), d.getMonth(), d.getDate());
  const end = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  return Math.round((end-start)/86400000);
}
function taskStatus(task){
  const expected = parseFreqDays(task.freq);
  if(!expected) return 'neutral';
  if(!task.lastRotated) return 'overdue';
  const days = daysSinceCalendar(task.lastRotated);
  if(days > expected) return 'overdue';
  if(days >= expected*0.7) return 'warning';
  return 'ok';
}
function statusLabel(status){
  return {ok:'im Rhythmus', warning:'bald fällig', overdue:'überfällig', neutral:'kein Rhythmus erkannt'}[status] || '';
}
const CATEGORY_ICONS = {'Küche':'🍳','Wohnzimmer':'🛋️','Bad':'🛁','Wohnung':'🏠','Keller':'📦','Garten':'🪴','Garage':'🚗','Schlafzimmer':'🛏️'};
const SKILL_TITLES = ['Neuling','Lehrling','Geübt','Erfahren','Routinier','Experte','Virtuose','Meister'];
function skillLevelFor(xp){
  const span = 50;
  const idx = Math.min(SKILL_TITLES.length-1, Math.floor(xp/span));
  return { level: idx+1, title: SKILL_TITLES[idx], into: xp-idx*span, span };
}
const LEVEL_TITLES = ['Frischling','Lehrling','Kehrgeselle','Staubwedel-Novize','Putzgeselle','Ordnungshüter','Sauberkeits-Adept','Glanz-Virtuose','Haushalts-Champion','Meister des Lappens','Legende des Lappens','Hüter der Vorratskammer'];
function levelFor(points){
  const span = 80;
  const idx = Math.min(LEVEL_TITLES.length-1, Math.floor(points/span));
  return { level: idx+1, title: LEVEL_TITLES[idx], into: points - idx*span, span };
}
function tierFor(percent){
  if(percent>=80) return 'happy';
  if(percent>=50) return 'ok';
  if(percent>=25) return 'meh';
  return 'bad';
}
const TIER_PHRASES = {
  happy: ['glänzt vor Stolz ✨','strahlt förmlich 🌟','ist bestens gelaunt 😄','könnte nicht zufriedener sein'],
  ok:    ['ist ganz zufrieden 🙂','fühlt sich wohl','läuft rund','hat nichts zu meckern'],
  meh:   ['könnte etwas Liebe vertragen 😐','wird langsam ungeduldig','mault leise vor sich hin','schielt schon zum Putzlappen'],
  bad:   ['fühlt sich vernachlässigt 😟','seufzt hörbar','sehnt sich nach Aufmerksamkeit','ruft laut nach Hilfe 😤']
};
function randomPhrase(tier){ const arr = TIER_PHRASES[tier]; return arr[Math.floor(Math.random()*arr.length)]; }
function houseMoodByCategory(){
  const groups = {};
  (state.clean.tasks||[]).forEach(t=>{
    if(!parseFreqDays(t.freq)) return;
    const cat = t.category || 'Sonstiges';
    groups[cat] = groups[cat] || [];
    groups[cat].push(t);
  });
  const scoreOf = {ok:100, warning:60, overdue:20};
  return Object.keys(groups).map(cat=>{
    const tasks = groups[cat];
    const sum = tasks.reduce((s,t)=> s + (scoreOf[taskStatus(t)] ?? 80), 0);
    return { cat, percent: Math.round(sum/tasks.length) };
  });
}
function houseMood(){
  const tasks = (state.clean.tasks||[]).filter(t=>parseFreqDays(t.freq));
  if(!tasks.length) return {percent:100, face:'🙂', label:'Alles ruhig'};
  const scoreOf = {ok:100, warning:60, overdue:20};
  const sum = tasks.reduce((s,t)=> s + (scoreOf[taskStatus(t)] ?? 80), 0);
  const percent = Math.round(sum/tasks.length);
  let face='😟', label='Braucht Aufmerksamkeit';
  if(percent>=80){ face='😄'; label='Bestens gelaunt'; }
  else if(percent>=50){ face='🙂'; label='Ganz zufrieden'; }
  else if(percent>=25){ face='😐'; label='Etwas mürrisch'; }
  return {percent, face, label};
}
function moodColor(percent){
  if(percent>=80) return '#5F8A3E';
  if(percent>=50) return '#B98A3E';
  if(percent>=25) return '#C77B3E';
  return '#B0503A';
}
function formatLastRotated(iso){
  if(!iso) return 'noch nie weitergegeben';
  const d = new Date(iso);
  const dateStr = d.toLocaleDateString('de-DE');
  const timeStr = d.toLocaleTimeString('de-DE', {hour:'2-digit', minute:'2-digit'});
  const days = daysSinceCalendar(iso);
  const daysText = days<=0 ? 'heute' : (days===1 ? 'gestern' : `vor ${days} Tagen`);
  return `zuletzt weitergegeben: ${dateStr}, ${timeStr} Uhr (${daysText})`;
}

function esc(s){ return (s||'').toString().replace(/[&<>]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }
function escAttr(s){ return esc(s).replace(/"/g,'&quot;'); }

function bindEvents(){
  // Recipes
  const addBtn = document.getElementById('addRecipeBtn');
  if(addBtn) addBtn.onclick = ()=> openRecipeModal(null);
  const searchInput = document.getElementById('recipeSearch');
  if(searchInput) searchInput.oninput = (e)=>{
    recipeSearch = e.target.value;
    const pos = e.target.selectionStart;
    render();
    const ni = document.getElementById('recipeSearch');
    if(ni){ ni.focus(); ni.setSelectionRange(pos,pos); }
  };
  const catSelect = document.getElementById('categoryFilter');
  if(catSelect) catSelect.onchange = ()=>{ categoryFilter = catSelect.value; render(); };
  document.querySelectorAll('[data-toshop]').forEach(btn=>{
    btn.onclick = async (e)=>{
      e.stopPropagation();
      const r = state.recipes.find(x=>x.id===btn.dataset.toshop);
      if(!r || !r.ingredients) return;
      const base = r.servings || 4;
      const current = servingOverrides[r.id] || base;
      const factor = current / base;
      let added = 0;
      r.ingredients.split('\n').map(s=>s.trim()).filter(Boolean).forEach(line=>{
        if(/:\s*$/.test(line) && !/^[\d.,]/.test(line)) return;
        const parsed = parseIngredientLine(line);
        let outLine = line;
        if(parsed && !parsed.header && parsed.amount != null){
          outLine = formatScaled(parsed.amount * factor) + ' ' + parsed.rest;
        }
        const before = state.shop.length;
        addOrMergeShopItem(outLine);
        if(state.shop.length > before) added++;
      });
      await saveKey(KEYS.shop, state.shop);
      showToast(added ? `${added} Zutat(en) hinzugefügt (${current} Portionen)` : 'Alles schon auf der Liste');
    };
  });
  document.querySelectorAll('[data-pdf]').forEach(elm=>{
    elm.onclick = (e)=>{ e.stopPropagation(); exportRecipesPdf(elm.dataset.pdf); };
  });
  const importBtn = document.getElementById('importBtn');
  if(importBtn) importBtn.onclick = ()=> openImportModal();
  const linkImportBtn = document.getElementById('linkImportBtn');
  if(linkImportBtn) linkImportBtn.onclick = ()=> openLinkImportModal();
  document.querySelectorAll('[data-open]').forEach(elm=>{
    elm.onclick = ()=>{ const id=elm.dataset.open; openRecipeId = openRecipeId===id?null:id; render(); };
  });
  document.querySelectorAll('[data-edit]').forEach(elm=>{
    elm.onclick = (e)=>{ e.stopPropagation(); openRecipeModal(state.recipes.find(r=>r.id===elm.dataset.edit)); };
  });
  document.querySelectorAll('[data-del]').forEach(elm=>{
    elm.onclick = async (e)=>{ e.stopPropagation();
      state.recipes = state.recipes.filter(r=>r.id!==elm.dataset.del);
      await saveKey(KEYS.recipes, state.recipes); render(); };
  });
  document.querySelectorAll('[data-servminus]').forEach(elm=>{
    elm.onclick = (e)=>{ e.stopPropagation();
      const r = state.recipes.find(x=>x.id===elm.dataset.servminus);
      const base = r.servings || 4;
      const cur = servingOverrides[r.id] || base;
      servingOverrides[r.id] = Math.max(1, cur-1); render(); };
  });
  document.querySelectorAll('[data-servplus]').forEach(elm=>{
    elm.onclick = (e)=>{ e.stopPropagation();
      const r = state.recipes.find(x=>x.id===elm.dataset.servplus);
      const base = r.servings || 4;
      const cur = servingOverrides[r.id] || base;
      servingOverrides[r.id] = cur+1; render(); };
  });

  // Week
  const weekModeCurrent = document.getElementById('weekModeCurrent');
  if(weekModeCurrent) weekModeCurrent.onclick = ()=>{ weekViewMode='current'; render(); };
  const weekModeNext = document.getElementById('weekModeNext');
  if(weekModeNext) weekModeNext.onclick = ()=>{ weekViewMode='next'; render(); };
  document.querySelectorAll('.weekSelect').forEach(sel=>{
    sel.onchange = async ()=>{
      const day = sel.dataset.day;
      const meal = sel.dataset.meal;
      const key = weekViewMode==='current' ? KEYS.week : KEYS.weekNext;
      const data = weekViewMode==='current' ? state.week : state.weekNext;
      data[day] = data[day] || {};
      data[day][meal] = data[day][meal] || {};
      if(data[day][meal].recipeId !== (sel.value || null)) data[day][meal].cooked = false;
      data[day][meal].recipeId = sel.value || null;
      await saveKey(key, data); render();
    };
  });
  document.querySelectorAll('.weekNote').forEach(inp=>{
    inp.onchange = async ()=>{
      const day = inp.dataset.day;
      const meal = inp.dataset.meal;
      const key = weekViewMode==='current' ? KEYS.week : KEYS.weekNext;
      const data = weekViewMode==='current' ? state.week : state.weekNext;
      data[day] = data[day] || {};
      data[day][meal] = data[day][meal] || {};
      data[day][meal].note = inp.value;
      await saveKey(key, data);
    };
  });
  document.querySelectorAll('[data-gorecipe]').forEach(btn=>{
    btn.onclick = ()=>{
      openRecipeId = btn.dataset.gorecipe;
      setTab('recipes');
      setTimeout(()=>{
        const el = document.querySelector(`[data-open="${openRecipeId}"]`);
        if(el) el.scrollIntoView({behavior:'smooth', block:'center'});
      }, 60);
    };
  });
  document.querySelectorAll('[data-togglecooked]').forEach(btn=>{
    btn.onclick = async ()=>{
      const day = btn.dataset.togglecooked;
      const meal = btn.dataset.meal;
      const key = weekViewMode==='current' ? KEYS.week : KEYS.weekNext;
      const data = weekViewMode==='current' ? state.week : state.weekNext;
      if(data[day] && data[day][meal]){
        data[day][meal].cooked = !data[day][meal].cooked;
        await saveKey(key, data); render();
      }
    };
  });
  const clearWeekBtn = document.getElementById('clearWeekBtn');
  if(clearWeekBtn) clearWeekBtn.onclick = async ()=>{
    const key = weekViewMode==='current' ? KEYS.week : KEYS.weekNext;
    if(weekViewMode==='current') state.week = {}; else state.weekNext = {};
    await saveKey(key, weekViewMode==='current' ? state.week : state.weekNext); render();
  };

  // Shop
  const addItemBtn = document.getElementById('addItemBtn');
  if(addItemBtn) addItemBtn.onclick = async ()=>{
    const inp = document.getElementById('newItem');
    if(inp.value.trim()){
      addOrMergeShopItem(inp.value.trim());
      await saveKey(KEYS.shop, state.shop); render();
    }
  };
  const newItemInp = document.getElementById('newItem');
  if(newItemInp) newItemInp.onkeydown = (e)=>{ if(e.key==='Enter') addItemBtn.click(); };
  const consolidateBtn = document.getElementById('consolidateBtn');
  if(consolidateBtn) consolidateBtn.onclick = async ()=>{
    consolidateShopList();
    await saveKey(KEYS.shop, state.shop); render();
  };
  const shareShopBtn = document.getElementById('shareShopBtn');
  if(shareShopBtn) shareShopBtn.onclick = ()=> openShopShareModal();
  document.querySelectorAll('[data-toggle]').forEach(cb=>{
    cb.onchange = async ()=>{
      const it = state.shop.find(i=>i.id===cb.dataset.toggle);
      it.checked = cb.checked;
      await saveKey(KEYS.shop, state.shop); render();
    };
  });
  document.querySelectorAll('[data-remove]').forEach(btn=>{
    btn.onclick = async ()=>{
      state.shop = state.shop.filter(i=>i.id!==btn.dataset.remove);
      await saveKey(KEYS.shop, state.shop); render();
    };
  });
  const clearBtn = document.getElementById('clearChecked');
  if(clearBtn) clearBtn.onclick = async ()=>{
    state.shop = state.shop.filter(i=>!i.checked);
    await saveKey(KEYS.shop, state.shop); render();
  };

  // Cleaning
  const moodFace = document.getElementById('moodFace');
  if(moodFace) moodFace.onclick = ()=>{
    const m = houseMood();
    showToast('Das Haus ' + randomPhrase(tierFor(m.percent)));
  };
  document.querySelectorAll('[data-needcat]').forEach(row=>{
    row.onclick = ()=>{
      const cat = row.dataset.needcat;
      const cm = houseMoodByCategory().find(c=>c.cat===cat);
      if(cm) showToast(cat + ' ' + randomPhrase(tierFor(cm.percent)));
    };
  });
  const addMemberBtn = document.getElementById('addMemberBtn');
  if(addMemberBtn) addMemberBtn.onclick = async ()=>{
    const inp = document.getElementById('newMember');
    if(inp.value.trim()){
      state.clean.members = state.clean.members || [];
      state.clean.members.push(inp.value.trim());
      await saveKey(KEYS.clean, state.clean); render();
    }
  };
  document.querySelectorAll('[data-rmMember]').forEach(btn=>{
    btn.onclick = async ()=>{
      const idx = parseInt(btn.dataset.rmmember);
      const name = state.clean.members[idx];
      state.clean.members.splice(idx,1);
      state.clean.tasks.forEach(t=>{
        if(t.assigneeIdx>=state.clean.members.length) t.assigneeIdx=0;
        if(t.doneBy && name in t.doneBy) delete t.doneBy[name];
        if(t.firstDoneBy===name){ t.firstDoneBy=null; t.firstDoneAt=null; }
      });
      if(state.clean.points) delete state.clean.points[name];
      if(state.clean.skills) delete state.clean.skills[name];
      await saveKey(KEYS.clean, state.clean); render();
    };
  });
  const addTaskBtn = document.getElementById('addTaskBtn');
  if(addTaskBtn) addTaskBtn.onclick = ()=> openTaskModal();
  document.querySelectorAll('[data-doneby]').forEach(btn=>{
    btn.onclick = async ()=>{
      const t = state.clean.tasks.find(x=>x.id===btn.dataset.doneby);
      const doerIdx = parseInt(btn.dataset.idx);
      const n = state.clean.members.length;
      const doer = state.clean.members[doerIdx];
      let pointsMsg = null;
      let didLevelUp = false;
      let extraMsg = null;
      let questMsg = null;
      const moodBeforeAction = houseMood().percent;
      const overdueDaysBefore = (()=>{
        if(!t.lastRotated) return 0;
        const days = Math.floor((Date.now() - new Date(t.lastRotated).getTime()) / 86400000);
        return Math.max(0, days);
      })();
      if(doer){
        const wasOnTime = taskStatus(t) !== 'overdue';
        const baseXp = taskXpValue(t);
        let gained = wasOnTime ? baseXp : Math.round(baseXp * 0.65);
        const critical = Math.random() < 0.15;
        if(critical) gained *= 2;
        if(critical) state.clean.criticalCount = (state.clean.criticalCount||0) + 1;
        const todayKey = isoDate(new Date());
        state.clean.dayLog = (state.clean.dayLog && state.clean.dayLog.date === todayKey)
          ? {date:todayKey, count: state.clean.dayLog.count + 1}
          : {date:todayKey, count:1};

        const quest = dailyQuestTask();
        const isQuest = quest && quest.id === t.id && !questDoneToday();
        if(isQuest){
          gained *= 2;
          state.clean.questDone = isoDate(new Date());
        }

        const masteryBefore = taskMastery(t).level;

        state.clean.points = state.clean.points || {};
        const before = state.clean.points[doer] || 0;
        state.clean.points[doer] = before + gained;
        const after = state.clean.points[doer];
        if(levelFor(after).level > levelFor(before).level) didLevelUp = true;

        const cat = t.category || 'Sonstiges';
        state.clean.skills = state.clean.skills || {};
        state.clean.skills[doer] = state.clean.skills[doer] || {};
        state.clean.skills[doer][cat] = (state.clean.skills[doer][cat]||0) + 10;

        t.completedCount = (t.completedCount||0) + 1;
        t.doneBy = t.doneBy || {};
        t.doneBy[doer] = (t.doneBy[doer]||0) + 1;
        if(!t.firstDoneBy){
          t.firstDoneBy = doer;
          t.firstDoneAt = new Date().toISOString();
        }

        const masteryAfter = taskMastery(t);
        if(masteryAfter.level > masteryBefore){
          extraMsg = '⭐ „' + t.task + '" ist jetzt: ' + masteryAfter.rank;
        }
        const newBadge = TASK_BADGES.find(b => b.at === t.completedCount);
        if(newBadge){
          extraMsg = newBadge.icon + ' Abzeichen für „' + t.task + '": ' + newBadge.label + ' erledigt!';
        }

        // Team streak: consecutive calendar days with at least one completion
        const today = isoDate(new Date());
        state.clean.streak = state.clean.streak || {count:0, lastDate:null};
        if(state.clean.streak.lastDate !== today){
          const yesterday = isoDate(addDays(new Date(), -1));
          state.clean.streak.count = (state.clean.streak.lastDate === yesterday) ? state.clean.streak.count + 1 : 1;
          state.clean.streak.lastDate = today;
        }

        pointsMsg = critical
          ? '💥 Kritischer Erfolg! ' + doer + ' +' + gained + ' Punkte, +10 ' + cat + '-Skill'
          : doer + ' +' + gained + ' Punkte, +10 ' + cat + '-Skill';
        if(isQuest) questMsg = '🎯 Tagesquest erfüllt – doppelte Punkte!';
      }
      if(n>0) t.assigneeIdx = (doerIdx+1) % n;
      t.lastRotated = new Date().toISOString();

      const freqDays = parseFreqDays(t.freq) || 7;
      const lastDone = t.lastRotated ? new Date(t.lastRotated) : null;
      const secrets = await checkSecretBadges(buildSecretContext({
        category: t.category,
        expectedDays: freqDays,
        overdueDays: overdueDaysBefore,
        helpers: 1,
        moodBefore: moodBeforeAction
      }));

      await saveKey(KEYS.clean, state.clean); render();

      const queue = [];
      if(questMsg) queue.push(questMsg);
      if(didLevelUp) queue.push('🎉 Level-Aufstieg für ' + doer + '!');
      if(extraMsg) queue.push(extraMsg);
      if(pointsMsg) queue.push(pointsMsg);
      secrets.forEach(b=> queue.push(`${b.icon} Geheimes Abzeichen: „${b.name}" – ${b.hint}`));
      if(didLevelUp || extraMsg || questMsg || secrets.length) triggerConfetti();
      queue.forEach((msg, i)=> setTimeout(()=> showToast(msg), 300 + i*1900));
    };
  });
  document.querySelectorAll('[data-subtask]').forEach(btn=>{
    btn.onclick = ()=>{
      const t = state.clean.tasks.find(x=>x.id===btn.dataset.subtask);
      if(!t || !t.subtasks) return;
      const sub = t.subtasks.find(s=>s.id===btn.dataset.subid);
      if(!sub) return;
      if(sub.done){ applySubtask(t, sub, null); return; }
      const members = state.clean.members || [];
      if(members.length <= 1){ applySubtask(t, sub, members[0] || null); return; }
      const wrap = document.createElement('div');
      wrap.innerHTML = `<div class="modal-bg" id="subWhoBg"><div class="modal">
        <h3>„${esc(sub.name)}" erledigt</h3>
        <p class="muted" style="margin-top:-6px">Wer hat das gemacht?</p>
        <div class="field">${members.map((m,i)=>`<button class="action" style="width:100%;margin-bottom:8px" data-subwho="${i}">✓ ${esc(m)}</button>`).join('')}</div>
        <div class="modal-actions"><button class="action ghost" id="subWhoCancel">Abbrechen</button></div>
      </div></div>`;
      document.body.appendChild(wrap.firstChild);
      document.getElementById('subWhoCancel').onclick = ()=> document.getElementById('subWhoBg').remove();
      document.querySelectorAll('[data-subwho]').forEach(b=>{
        b.onclick = ()=>{
          const who = members[parseInt(b.dataset.subwho)];
          document.getElementById('subWhoBg').remove();
          applySubtask(t, sub, who);
        };
      });
    };
  });
  document.querySelectorAll('[data-edittask]').forEach(btn=>{
    btn.onclick = ()=>{
      const t = state.clean.tasks.find(x=>x.id===btn.dataset.edittask);
      if(t) openTaskModal(t);
    };
  });
  document.querySelectorAll('[data-setprio]').forEach(sel=>{
    sel.onchange = async ()=>{
      const t = state.clean.tasks.find(x=>x.id===sel.dataset.setprio);
      if(t){ t.priority = sel.value; await saveKey(KEYS.clean, state.clean); render(); }
    };
  });
  document.querySelectorAll('[data-nudgeopen]').forEach(btn=>{
    btn.onclick = ()=> openNudgeModal(btn.dataset.nudgeopen);
  });
  document.querySelectorAll('[data-deltask]').forEach(btn=>{
    btn.onclick = async ()=>{
      state.clean.tasks = state.clean.tasks.filter(t=>t.id!==btn.dataset.deltask);
      await saveKey(KEYS.clean, state.clean); render();
    };
  });
}

function taskModal(existing){
  const e = existing || null;
  const members = state.clean.members || [];
  const options = members.map((m,i)=>`<option value="${i}" ${e && e.assigneeIdx===i?'selected':''}>${esc(m)}</option>`).join('');
  const catOptions = Object.keys(CATEGORY_ICONS).map(c=>`<option value="${escAttr(c)}" ${e && e.category===c?'selected':''}>${CATEGORY_ICONS[c]} ${esc(c)}</option>`).join('');
  const subText = e && e.subtasks ? e.subtasks.map(s=>s.name).join('\n') : '';
  return `<div class="modal-bg" id="taskBg"><div class="modal">
    <h3>${e ? 'Aufgabe bearbeiten' : 'Neue Putzaufgabe'}</h3>
    <div class="field"><label>Aufgabe</label><input id="t_task" placeholder="z. B. Bad putzen" value="${e?escAttr(e.task):''}"></div>
    <div class="row">
      <div class="field"><label>Rhythmus</label><select id="t_freq">${FREQ_OPTIONS.map(o=>`<option value="${escAttr(o.value)}" ${(e ? e.freq===o.value : o.value==='Wöchentlich')?'selected':''}>${esc(o.value)}</option>`).join('')}</select></div>
      <div class="field"><label>Bereich</label><select id="t_category">${catOptions}</select></div>
    </div>
    <div class="field"><label>Zuständig</label><select id="t_assignee">${options || '<option value="0">– niemand angelegt –</option>'}</select></div>
    <div class="field"><label>Priorität</label><select id="t_priority">${Object.entries(PRIORITIES).map(([k,v])=>`<option value="${k}" ${(e ? taskPriority(e)===k : k==='mittel')?'selected':''}>${v.icon} ${v.label}</option>`).join('')}</select></div>
    <div class="field"><label>Teilaufgaben (optional, eine pro Zeile)</label><textarea id="t_subtasks" style="min-height:70px" placeholder="Klo&#10;Dusche&#10;Waschbecken">${esc(subText)}</textarea></div>
    <div class="modal-actions">
      <button class="action ghost" id="taskCancel">Abbrechen</button>
      <button class="action" id="taskSave" data-editid="${e?e.id:''}">Speichern</button>
    </div>
  </div></div>`;
}
function openTaskModal(existing){
  const wrap = document.createElement('div');
  wrap.innerHTML = taskModal(existing);
  document.body.appendChild(wrap.firstChild);
  document.getElementById('taskCancel').onclick = ()=> document.getElementById('taskBg').remove();
  document.getElementById('taskSave').onclick = async ()=>{
    const task = document.getElementById('t_task').value.trim();
    if(!task){ document.getElementById('t_task').focus(); return; }
    const freq = document.getElementById('t_freq').value.trim();
    const category = document.getElementById('t_category').value;
    const assigneeIdx = parseInt(document.getElementById('t_assignee').value) || 0;
    const priority = document.getElementById('t_priority').value;
    const names = document.getElementById('t_subtasks').value.split('\n').map(s=>s.trim()).filter(Boolean);
    const editId = document.getElementById('taskSave').dataset.editid;

    state.clean.tasks = state.clean.tasks || [];
    if(editId){
      const t = state.clean.tasks.find(x=>x.id===editId);
      if(t){
        const prevSubs = t.subtasks || [];
        t.task = task; t.freq = freq; t.category = category;
        t.priority = priority; t.assigneeIdx = assigneeIdx;
        t.subtasks = names.map(name=>{
          const old = prevSubs.find(p=>p.name===name);
          return old || {id:uid(), name, done:false};
        });
      }
    } else {
      const subs = names.map(name=>({id:uid(), name, done:false}));
      state.clean.tasks.push({id:uid(), task, freq, category, priority, subtasks:subs, assigneeIdx, lastRotated:null, completedCount:0, firstDoneBy:null, firstDoneAt:null});
    }
    await saveKey(KEYS.clean, state.clean);
    document.getElementById('taskBg').remove();
    render();
  };
}

function openRecipeModal(existing){
  const wrap = document.createElement('div');
  wrap.innerHTML = recipeModal(existing);

  document.getElementById('modalCancel').onclick = ()=> document.getElementById('modalBg').remove();

      id: id || uid(),
      title: titleVal,
      category: catVal || guessCategory(titleVal, ingVal),
      servings: parseInt(document.getElementById('f_servings').value) || 4,
      prepTime: document.getElementById('f_prep').value.trim(),
      cookTime: document.getElementById('f_cook').value.trim(),
      calories: parseInt(document.getElementById('f_cal').value) || 0,

async function exportAllData(){
  const res = await fetch(`${SUPABASE_URL}/rest/v1/storage?select=key,value`, {
    headers:{ apikey:SUPABASE_ANON_KEY, Authorization:`Bearer ${SUPABASE_ANON_KEY}` }
  });
  if(!res.ok) throw new Error('Export fehlgeschlagen');
  return await res.json();
}
async function restoreAllData(rows){
  const res = await fetch(`${SUPABASE_URL}/rest/v1/storage`, {
    method:'POST',
    headers:{
      apikey:SUPABASE_ANON_KEY, Authorization:`Bearer ${SUPABASE_ANON_KEY}`,
      'Content-Type':'application/json', 'Prefer':'resolution=merge-duplicates,return=minimal'
    },
    body: JSON.stringify(rows)
  });
  if(!res.ok) throw new Error('Import fehlgeschlagen');
}

  const wrap = document.createElement('div');
  wrap.innerHTML = backupModal();
  document.body.appendChild(wrap.firstChild);
  document.getElementById('backupCancel').onclick = ()=> document.getElementById('backupBg').remove();
  const exportArea = document.getElementById('backupExport');
  try{
    const rows = await exportAllData();
    exportArea.value = JSON.stringify(rows, null, 2);
  }catch(e){
    exportArea.value = '';
    exportArea.placeholder = 'Konnte nicht laden – bitte Verbindung prüfen.';
  }
  document.getElementById('backupCopy').onclick = async ()=>{
    exportArea.select();
    try{ await navigator.clipboard.writeText(exportArea.value); showToast('In Zwischenablage kopiert ✓'); }
    catch(e){ showToast('Bitte Text manuell markieren & kopieren', true); }
  };
  const blob = new Blob([exportArea.value], {type:'application/json'});
  const dlLink = document.getElementById('backupDownload');
  dlLink.href = URL.createObjectURL(blob);
  dlLink.download = 'vorratskammer-backup.json';
  document.getElementById('backupRestore').onclick = async ()=>{
    const status = document.getElementById('backupStatus');
    try{
      const rows = JSON.parse(document.getElementById('backupImport').value);
      if(!Array.isArray(rows)) throw new Error('falsches Format');
      await restoreAllData(rows);
      status.textContent = 'Wiederhergestellt ✓ – Seite lädt neu …';
      setTimeout(()=> location.reload(), 1200);
    }catch(e){
      status.textContent = 'Konnte den Text nicht lesen. Bitte kompletten Backup-Text einfügen.';
    }
  };
}

loadAll();
</script>
</body>
</html>
